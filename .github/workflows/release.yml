name: Release Build

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag/name to publish the build under (e.g. v26.2.1)"
        required: false
        default: ""

permissions:
  contents: write # needed to create releases / upload assets

jobs:
  build:
    name: Build release binary (linux/amd64)
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.4"
          check-latest: false

      - name: Verify toolchain
        run: |
          go version
          go env GOROOT GOOS GOARCH

      - name: Build (release mode)
        env:
          CGO_ENABLED: "0"
          GOOS: linux
          GOARCH: amd64
        run: |
          go build -trimpath -ldflags="-s -w" -o minewire-server .
          ls -lh minewire-server
          file minewire-server || true

      - name: Package
        run: |
          chmod +x minewire-server
          tar -czf minewire-server-linux-amd64.tar.gz \
            minewire-server \
            server.yaml \
            server-icon.png \
            minewire-server.service \
            setup.sh
          sha256sum minewire-server minewire-server-linux-amd64.tar.gz | tee SHA256SUMS.txt

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: minewire-server-linux-amd64
          path: |
            minewire-server
            minewire-server-linux-amd64.tar.gz
            SHA256SUMS.txt

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            minewire-server
            minewire-server-linux-amd64.tar.gz
            SHA256SUMS.txt
